<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carte Produit</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<div class="card">

<span class="badge">Promo</span>

<img src="image/ordi2.jpg" alt="Ordinateur portable">

<h2>Ordinateur Portable</h2>

<p>
Intel Core i7 • 16 Go RAM • SSD 512 Go
</p>

<h3>899 €</h3>

<div class="stars">
★★★★★
</div>

<div class="buttons">

<button class="buy">
Ajouter au panier
</button>

<button class="fav">
Favoris
</button>

</div>

</div>

<div class="card">

<span class="badge stock">
En stock
</span>

<img src="image/telephone.jpg" alt="Téléphone">

<h2>Smartphone</h2>

<p>
Écran AMOLED • 256 Go • 5G
</p>

<h3>599 €</h3>

<div class="stars">
★★★★☆
</div>

<div class="buttons">

<button class="buy">
Ajouter au panier
</button>

<button class="fav">
Favoris
</button>

</div>

</div>

<div class="card">

<span class="badge">Promo</span>

<img src="image/casque.jpg" alt="Casque">

<h2>Casque Bluetooth</h2>

<p>
Réduction de bruit active
</p>

<h3>149 €</h3>

<div class="stars">
★★★★★
</div>

<div class="buttons">

<button class="buy">
Ajouter au panier
</button>

<button class="fav">
Favoris
</button>

</div>

</div>

</div>

</body>
</html>
